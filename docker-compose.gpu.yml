services:
  ia:
    image: carolinavilela/deepfaketeste:v2.0
    build: .
    container_name: ia_gpu
    runtime: nvidia
    network_mode: host

    volumes:
      - .:/app

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all

    tty: true
    stdin_open: true
